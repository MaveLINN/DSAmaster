name: Sync Leetcode

on:
  workflow_dispatch: # This adds a button so you can manually run it anytime
  schedule:
    - cron: "0 0 * * *" # This runs the script automatically every single day at midnight UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Solutions
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
